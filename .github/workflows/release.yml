name: Auto Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: auto-release-main
  cancel-in-progress: false

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump patch version
        id: bump
        env:
          RELEASE_PUSH_TOKEN: ${{ secrets.RELEASE_PUSH_TOKEN }}
        run: |
          if [ -z "$RELEASE_PUSH_TOKEN" ]; then
            if [ "$GITHUB_ACTOR" = "dependabot[bot]" ]; then
              echo "Missing RELEASE_PUSH_TOKEN for Dependabot-triggered run."
              echo "Add RELEASE_PUSH_TOKEN in Settings > Secrets and variables > Dependabot."
            else
              echo "Missing RELEASE_PUSH_TOKEN secret. Add an admin PAT in Settings > Secrets and variables > Actions."
            fi
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          CURRENT_VERSION="$(node -p "require('./package.json').version")"
          LATEST_TAG="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"

          BASE_VERSION="$CURRENT_VERSION"
          if [ -n "$LATEST_TAG" ]; then
            LATEST_VERSION="${LATEST_TAG#v}"
            BASE_VERSION="$(printf '%s\n%s\n' "$CURRENT_VERSION" "$LATEST_VERSION" | sort -V | tail -n 1)"
          fi

          IFS='.' read -r major minor patch <<< "$BASE_VERSION"
          if [ -z "${major:-}" ] || [ -z "${minor:-}" ] || [ -z "${patch:-}" ]; then
            echo "Invalid semantic version: $BASE_VERSION"
            exit 1
          fi

          NEXT_VERSION="${major}.${minor}.$((patch + 1))"
          NEW_TAG="v${NEXT_VERSION}"

          npm version "$NEXT_VERSION" --no-git-tag-version

          git add package.json
          if [ -f package-lock.json ]; then
            git add package-lock.json
          fi

          git commit -m "chore: bump version ${NEW_TAG}"
          git tag -a "${NEW_TAG}" -m "chore: bump version ${NEW_TAG}"

          echo "tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"

          RELEASE_PUSH_TOKEN_CLEAN="$(printf '%s' "$RELEASE_PUSH_TOKEN" | tr -d '\r\n')"
          if [ -z "$RELEASE_PUSH_TOKEN_CLEAN" ]; then
            echo "RELEASE_PUSH_TOKEN is empty after trimming. Re-save it in Actions secrets."
            exit 1
          fi

          git config --local credential.helper store
          printf 'https://x-access-token:%s@github.com\n' "$RELEASE_PUSH_TOKEN_CLEAN" > ~/.git-credentials
          git remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git push --atomic origin HEAD:main --follow-tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          generate_release_notes: true
